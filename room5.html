<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room 5: Rainbow Logic</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <a href="index.html">Home</a>
        <a href="index.html#leaderboard">Leaderboard</a>
    </nav>
    <div class="container">
        <h1>Room 5: Leprechaun Riddle</h1>
        <p>The final challenge! The AI leprechaun guards the pot of gold with a riddle. Solve it to claim your prize.</p>
        <img src="assets/rainbow.png" alt="Rainbow" style="width: 200px; height: 100px; margin: 10px;">
        <p>Riddle: I'm green and I'm lucky, I bring fortune to you. What am I?</p>
        <input type="text" id="team-input" placeholder="Enter the answer">
        <button id="submit-btn">Submit</button>
        <p id="message"></p>
    </div>
    <div class="ai-head" onclick="toggleBubble()">
        <img src="assets/leprechaun-ai.png" alt="AI Head">
        <div class="ai-bubble" id="ai-bubble">
            Room 5: Think about St. Patrick's Day symbols. What's green and lucky?
        </div>
    </div>
    <audio id="correct-sound" src="audio/correct.mp3"></audio>
    <audio id="incorrect-sound" src="audio/incorrect.mp3"></audio>
    <script src="js/room5.js"></script>
</body>
</html>
